name: CI/CD - BlogApp

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  IMAGE_NAME: blogapp-backend

jobs:

  # ─────────────────────────────────────────
  # JOB 1 — BUILD & PUSH TO ECR
  # ─────────────────────────────────────────
  build:
    name: Build & Push to ECR
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag (short commit SHA)
        id: vars
        run: echo "image_tag=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t $ECR_REGISTRY/$IMAGE_NAME:${{ steps.vars.outputs.image_tag }} ./Backend

      - name: Push to ECR (SHA tag + latest)
        run: |
          docker push $ECR_REGISTRY/$IMAGE_NAME:${{ steps.vars.outputs.image_tag }}
          docker tag $ECR_REGISTRY/$IMAGE_NAME:${{ steps.vars.outputs.image_tag }} $ECR_REGISTRY/$IMAGE_NAME:latest
          docker push $ECR_REGISTRY/$IMAGE_NAME:latest

  # ─────────────────────────────────────────
  # JOB 2 — DEPLOY TO EC2
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Login to ECR from EC2
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
              docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

            # Pull latest image
            docker pull ${{ secrets.ECR_REGISTRY }}/bloggapp-backend:latest

            # Stop and remove old container
            docker stop bloggapp-backend || true
            docker rm bloggapp-backend || true

            # Run new container
            docker run -d \
              --name bloggapp-backend \
              --restart always \
              -p 5000:5000 \
              -e MONGO_URI=${{ secrets.MONGO_URI }} \
              ${{ secrets.ECR_REGISTRY }}/bloggapp-backend:latest

  # ─────────────────────────────────────────
  # JOB 3 — NOTIFY
  # ─────────────────────────────────────────
  notify:
    name: Notify Result
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: always()

    steps:
      - name: Success
        if: ${{ needs.deploy.result == 'success' }}
        run: echo "✅ Deployed successfully!"

      - name: Failure
        if: ${{ needs.deploy.result != 'success' }}
        run: echo "❌ Deployment failed — check logs!"